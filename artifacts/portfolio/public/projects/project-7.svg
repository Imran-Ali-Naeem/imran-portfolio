    <ellipse cx="650" cy="225" rx="82" ry="97" fill="none" stroke="#8b5cf6" stroke-width="2" opacity="0.4"/>
  </g>
  <!-- L1 loss wave bottom -->
  <polyline points="100,390 150,380 200,400 250,375 300,395 350,378 400,398 450,372 500,392 550,376 600,394 650,380 700,396" stroke="#8b5cf640" stroke-width="1.5" fill="none"/>
  <!-- Title hint -->
  <text x="400" y="430" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b5cf660">CONDITIONAL GAN · SKETCH-TO-REALISTIC</text>
</svg>
