  <text x="524" y="97" font-family="monospace" font-size="11" fill="#f59e0b">output.cpp</text>
  <text x="524" y="135" font-family="monospace" font-size="10" fill="#f59e0b80">#include &lt;iostream&gt;</text>
  <text x="524" y="155" font-family="monospace" font-size="10" fill="#f59e0b60">using namespace std;</text>
  <text x="524" y="175" font-family="monospace" font-size="10" fill="#f59e0b80">int main() {</text>
  <text x="538" y="195" font-family="monospace" font-size="10" fill="#f59e0b60">int n, res = 1;</text>
  <text x="538" y="215" font-family="monospace" font-size="10" fill="#f59e0b80">cin &gt;&gt; n;</text>
  <text x="538" y="235" font-family="monospace" font-size="10" fill="#f59e0b60">for(int i=1;i&lt;=n;i++)</text>
  <text x="553" y="255" font-family="monospace" font-size="10" fill="#f59e0b80">res *= i;</text>
  <text x="538" y="275" font-family="monospace" font-size="10" fill="#f59e0b60">cout &lt;&lt; res;</text>
  <text x="524" y="295" font-family="monospace" font-size="10" fill="#f59e0b80">return 0;</text>
  <text x="524" y="315" font-family="monospace" font-size="10" fill="#f59e0b60">}</text>
