  <text x="54" y="97" font-family="monospace" font-size="11" fill="#06b6d4">pseudocode.txt</text>
  <text x="54" y="135" font-family="monospace" font-size="10" fill="#06b6d480">INPUT n</text>
  <text x="54" y="155" font-family="monospace" font-size="10" fill="#06b6d460">SET result = 1</text>
  <text x="54" y="175" font-family="monospace" font-size="10" fill="#06b6d480">FOR i = 1 TO n DO</text>
  <text x="68" y="195" font-family="monospace" font-size="10" fill="#06b6d460">result = result * i</text>
  <text x="54" y="215" font-family="monospace" font-size="10" fill="#06b6d480">END FOR</text>
  <text x="54" y="235" font-family="monospace" font-size="10" fill="#06b6d460">PRINT result</text>
  <line x1="54" y1="252" x2="265" y2="252" stroke="#06b6d420" stroke-width="0.8"/>
  <text x="54" y="272" font-family="monospace" font-size="10" fill="#06b6d440">READ arr[n]</text>
  <text x="54" y="290" font-family="monospace" font-size="10" fill="#06b6d460">SORT arr ASC</text>
  <text x="54" y="310" font-family="monospace" font-size="10" fill="#06b6d440">FOR each elem</text>
  <text x="54" y="328" font-family="monospace" font-size="10" fill="#06b6d460">  PRINT elem</text>
