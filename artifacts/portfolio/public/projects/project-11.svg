  <g opacity="0.15" filter="url(#glow11)">
    <rect x="730" y="60" width="14" height="42" rx="3" fill="#22c55e"/>
    <rect x="716" y="74" width="42" height="14" rx="3" fill="#22c55e"/>
  </g>
  <text x="400" y="418" text-anchor="middle" font-family="monospace" font-size="10" fill="#22c55e40">C# .NET · ORACLE DB · HOSPITAL MANAGEMENT</text>
