  <line x1="210" y1="145" x2="325" y2="305" stroke="#22c55e40" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="475" y1="125" x2="590" y2="215" stroke="#22c55e40" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="475" y1="305" x2="590" y2="215" stroke="#22c55e40" stroke-width="1" stroke-dasharray="5,3"/>
