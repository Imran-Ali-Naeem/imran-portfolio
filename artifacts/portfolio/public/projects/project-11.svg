    <text x="75" y="142" font-family="monospace" font-size="9" fill="#22c55e60">name</text>
    <text x="75" y="158" font-family="monospace" font-size="9" fill="#22c55e60">dob</text>
    <text x="75" y="174" font-family="monospace" font-size="9" fill="#22c55e60">blood_type</text>
